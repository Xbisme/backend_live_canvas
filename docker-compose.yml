# Local development services for the dev flavor (BE-004: + redis broker, minio 2-zone storage).
# Start everything with: docker compose up -d db redis minio
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: livecanvas
      POSTGRES_PASSWORD: livecanvas
      POSTGRES_DB: livecanvas
    ports:
      - "5432:5432"
    volumes:
      - livecanvas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livecanvas -d livecanvas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      # Host port 6380 to avoid colliding with other local redis containers;
      # CELERY_BROKER_URL in .env.dev points at redis://localhost:6380/0.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - livecanvas_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init: create the two storage zones and open anonymous download on the
  # public bucket (mirrors R2 prod: private bucket presigned-only, public bucket behind CDN).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/livecanvas-private &&
      mc mb --ignore-existing local/livecanvas-public &&
      mc anonymous set download local/livecanvas-public &&
      echo 'minio buckets ready'
      "

volumes:
  livecanvas_pgdata:
  livecanvas_minio:
